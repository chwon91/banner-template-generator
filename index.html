<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그립 배너 템플릿 생성기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app-container">

  <!-- 헤더 -->
  <header class="app-header">
    <h1>그립 배너 템플릿 생성기</h1>
    <p>편성 데이터를 붙여넣고 시스템 업로드용 Excel 템플릿을 자동 생성합니다.</p>
  </header>

  <!-- 탭 네비게이션 -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="tab-live">라이브배너</button>
    <button class="tab-btn" data-tab="tab-video">영상 배너</button>
    <button class="tab-btn" data-tab="tab-image">이미지 배너</button>
  </nav>

  <!-- ===== 탭 1: 라이브배너 ===== -->
  <section id="tab-live" class="tab-panel active">

    <div class="card">
      <div class="card-title">입력 데이터</div>

      <div class="form-group">
        <label for="yearInput">연도</label>
        <input type="number" id="yearInput" min="2020" max="2099" placeholder="2026" />
      </div>

      <div class="form-group">
        <label for="lbText">LB_ 텍스트 (여러 줄 붙여넣기)</label>
        <textarea
          id="lbText"
          placeholder="LB_2_4/10 11:00 완내스오빠&#10;LB_2_4/10 13:00 흥정대황군&#10;LB_3_4/10 11:00 천억언니"
        ></textarea>
      </div>

      <div class="form-group">
        <label>Metabase 파일 (.xlsx)</label>
        <div class="file-upload-area">
          <label class="file-label">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
              <path d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm3 2h6v1H7V5zm0 3h6v1H7V8zm0 3h4v1H7v-1z"/>
            </svg>
            파일 선택
            <input type="file" id="metabaseFile" accept=".xlsx,.xls" />
          </label>
          <span id="metabaseFileName" class="file-name">파일을 선택해주세요</span>
        </div>
        <p class="hint-text">
          필수 컬럼: <code>USER_ID</code>, <code>USER_NAME</code>
        </p>
      </div>

      <div class="action-bar">
        <button class="btn btn-primary" id="btnParse">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h7a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/>
          </svg>
          파싱 &amp; 미리보기
        </button>
      </div>
    </div>

    <!-- 알림 영역 -->
    <div id="lbAlert"></div>

    <!-- 미리보기 테이블 -->
    <div class="card">
      <div class="card-title">미리보기</div>
      <div id="lbPreview">
        <div class="empty-state">위 입력 후 [파싱 &amp; 미리보기] 버튼을 누르세요.</div>
      </div>

      <div class="download-bar">
        <button class="btn btn-success" id="btnDownloadLive">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
          라이브 템플릿 다운로드
        </button>
        <div class="lb-reg-group">
          <span class="lb-reg-label">라이브배너등록 템플릿</span>
          <div class="lb-reg-btns">
            <button class="btn btn-success btn-sm" data-lb-pos="2">LB_2</button>
            <button class="btn btn-success btn-sm" data-lb-pos="3">LB_3</button>
            <button class="btn btn-success btn-sm" data-lb-pos="4">LB_4</button>
            <button class="btn btn-success btn-sm" data-lb-pos="5">LB_5</button>
            <button class="btn btn-success btn-sm" data-lb-pos="6">LB_6</button>
          </div>
        </div>
      </div>
    </div>

  </section>

  <!-- ===== 탭 2: 영상 배너 ===== -->
  <section id="tab-video" class="tab-panel">

    <div class="card">
      <div class="card-title">영상 배너 데이터 입력</div>

      <div id="video-alert"></div>

      <div class="add-btn-wrap">
        <button class="btn btn-primary" id="video-addRow">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
          </svg>
          행 추가
        </button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>제목 (말머리 포함)</th>
              <th>원본 URL</th>
              <th>변환된 스킴 (자동)</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="video-tbody">
            <tr>
              <td colspan="4" class="empty-state">[행 추가] 버튼을 눌러 데이터를 입력하세요.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="download-bar">
        <button class="btn btn-success" id="btnDownloadVideo">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
          영상 템플릿 다운로드
        </button>
      </div>
    </div>

    <!-- URL 변환 규칙 (JS 렌더링) -->
    <div id="url-rules-video"></div>

  </section>

  <!-- ===== 탭 3: 이미지 배너 ===== -->
  <section id="tab-image" class="tab-panel">

    <div class="card">
      <div class="card-title">이미지 배너 데이터 입력</div>

      <div id="image-alert"></div>

      <div class="add-btn-wrap">
        <button class="btn btn-primary" id="image-addRow">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
          </svg>
          행 추가
        </button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>제목 (말머리 포함)</th>
              <th>원본 URL</th>
              <th>변환된 스킴 (자동)</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="image-tbody">
            <tr>
              <td colspan="4" class="empty-state">[행 추가] 버튼을 눌러 데이터를 입력하세요.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="download-bar">
        <button class="btn btn-success" id="btnDownloadImage">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
          이미지 템플릿 다운로드
        </button>
      </div>
    </div>

    <!-- URL 변환 규칙 (JS 렌더링) -->
    <div id="url-rules-image"></div>

  </section>

</div><!-- /.app-container -->

<!-- SheetJS CDN -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<!-- App Logic -->
<script src="app.js"></script>

</body>
</html>
